services:
  postgres:
    image: postgres:16
    container_name: powerpos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: powerpos
      POSTGRES_PASSWORD: powerpos123
      POSTGRES_DB: powerpos_dev
    ports:
      - "5432:5432"
    volumes:
      - C:/Users/Lenovo/Documents/GitHub/powerpos-data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: powerpos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - C:/Users/Lenovo/Documents/GitHub/powerpos-data/redis:/data